spring:
  application:
    name: interior-test

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true

jwt:
  secret: test-jwt-secret-key-for-unit-and-integration-tests-only-not-for-production
  access-token-expiration: 3600000

logging:
  level:
    org.hibernate.SQL: debug
